<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 300px; margin: 0; padding: 14px; color: #1f2430; }
  h1 { font-size: 15px; margin: 0 0 10px; }
  label { display: block; font-size: 12px; color: #6b7280; margin: 8px 0 2px; }
  input { width: 100%; box-sizing: border-box; padding: 7px 8px; border: 1px solid #e5e7eb; border-radius: 6px; font-size: 13px; }
  button { margin-top: 12px; width: 100%; background: #4f46e5; color: #fff; border: 0; border-radius: 6px; padding: 8px; font-size: 13px; cursor: pointer; }
  button.secondary { background: #e5e7eb; color: #1f2430; }
  .error { color: #dc2626; font-size: 12px; margin-top: 8px; }
  .status { background: #f4f5f7; border-radius: 8px; padding: 10px; font-size: 13px; margin-bottom: 8px; }
  .status .ok { color: #10b981; font-weight: 600; }
  .status .no { color: #6b7280; }
  .row { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 13px; }
  a { color: #4f46e5; font-size: 12px; }
  .hidden { display: none; }
</style>
</head>
<body>
  <h1>📌 YaHerd</h1>

  <div id="login-view" class="hidden">
    <label>Server URL</label>
    <input id="serverUrl" placeholder="http://localhost:8000">
    <label>Email</label>
    <input id="email" type="email">
    <label>Password</label>
    <input id="password" type="password">
    <button id="login-btn">Log in</button>
    <div id="login-error" class="error"></div>
  </div>

  <div id="main-view" class="hidden">
    <div class="status" id="site-status"></div>
    <div class="row hidden" id="toggle-row">
      <input type="checkbox" id="site-toggle" style="width:auto">
      <label for="site-toggle" style="margin:0;color:#1f2430">Show overlay on this site</label>
    </div>
    <div class="row"><a id="dashboard-link" target="_blank">Open dashboard ↗</a></div>
    <div class="row" style="justify-content:space-between">
      <span id="who" style="font-size:12px;color:#6b7280"></span>
      <button id="logout-btn" class="secondary" style="width:auto;margin:0;padding:5px 10px">Log out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
