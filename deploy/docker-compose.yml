name: yaherd

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8093:80"
    environment:
      DB_HOST: db
      DB_NAME: yaherd
      DB_USER: yaherd
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in deploy/.env}
      # Email (optional). Set these in deploy/.env to send new users their
      # login details. Leave SMTP_HOST empty to disable outbound email.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-tls}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-YaHerd}
      APP_BASE_URL: ${APP_BASE_URL:-}
    volumes:
      - screenshots:/var/www/html/server/storage/screenshots
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: yaherd
      MYSQL_USER: yaherd
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in deploy/.env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in deploy/.env}
    volumes:
      - db_data:/var/lib/mysql
      # Schema is loaded automatically on first boot (empty data volume only).
      - ../schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  db_data:
  screenshots:
